plugins {
	id 'java-library'
	id 'eclipse'
	id 'idea'
	id 'net.neoforged.moddev' version '2.0.134'
}

import groovy.json.JsonOutput
import groovy.json.JsonSlurper

version = '1.10.1-beta1'
group = 'net.geforcemods.securitycraft'

base {
	archivesName = 'securitycraft'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(25)
println('Java: ' + System.getProperty('java.version') + ' JVM: ' + System.getProperty('java.vm.version') + '(' + System.getProperty('java.vendor') + ') Arch: ' + System.getProperty('os.arch'))

processResources {
	exclude ".cache"
	duplicatesStrategy = 'include'

	//minify json resources
	doLast {
		fileTree(dir: outputs.files.asPath, include: "**/*.json").each {
			File file -> file.text = JsonOutput.toJson(new JsonSlurper().parse(file))
		}
	}
}

sourceSets.main.resources {
	srcDir 'src/generated/resources' //include generated files
}

neoForge {
	version = "26.1.0.1-beta"
	validateAccessTransformers = true

	runs {
		configureEach {
			logLevel = org.slf4j.event.Level.DEBUG
			gameDirectory = project.file('run/' + name)
			ideName = "SC ${project.mc_version} " + ideName.get()
		}

		client {
			client()
		}

		client2 {
			client()
			gameDirectory = project.file('run/client')
			programArguments.addAll('--username', 'Dev2')
		}

		server {
			server()
			programArgument('-nogui')
		}

		data {
			clientData()
			programArguments.addAll('--mod', 'securitycraft', '--all', '--output', file('src/generated/resources/').getAbsolutePath())
		}
	}

	mods {
		securitycraft {
			sourceSet(sourceSets.main)
		}
	}
}

repositories {
	maven {
		url = "https://cursemaven.com/"
		content {
			includeGroup "curse.maven"
		}
	}

	exclusiveContent {
		forRepository {
			maven {
				url = "https://api.modrinth.com/maven"
			}
		}
		filter {
			includeGroup "maven.modrinth"
		}
	}

	maven {
		url = "https://maven.caffeinemc.net/releases"
	}
}

dependencies {
	compileOnly "curse.maven:architectury-api-419699:5553800" //FTB Teams dependency
	compileOnly "curse.maven:ftb-library-forge-404465:5557408" //FTB Teams dependency
	compileOnly "curse.maven:ftb-teams-forge-404468:5448371"
	compileOnly "curse.maven:jei-238222:7861613"
    //compileOnly "curse.maven:the-one-probe-245211:5502323" //Incompatible at compile time because of ResourceLocation -> Identifier
    compileOnly "curse.maven:jade-324717:7313008"
	compileOnly "curse.maven:betterf3-401648:7436342"
	compileOnly "curse.maven:cloth-config-348521:7361439" //BetterF3 dependency
    compileOnly "curse.maven:wthit-forge-455982:7546202"
    compileOnly "curse.maven:badpackets-615134:7324636" //WTHIT dependency
	compileOnly "curse.maven:projecte-226410:3955047"
	compileOnly "curse.maven:embeddium-908741:6116910" //Incompatible with Sodium
	// The actual mod jar is jarjar'd into the Modrinth jar, but NeoForge doesn't load it, so the mod has to be added from CaffeineMCs' maven separately
	compileOnly "maven.modrinth:sodium:mc1.21.11-0.8.4-neoforge"
	compileOnly "net.caffeinemc:sodium-neoforge-mod:0.8.4+mc1.21.11"
}

tasks.named('jar', Jar).configure {
	exclude('net/geforcemods/securitycraft/datagen/**') //exclude files from the built jar that are only used to generate the assets & data
	archiveFileName = "[${project.mc_version}] SecurityCraft v${version}.jar"
	manifest {
		attributes(["Specification-Title": "SecurityCraft",
					"Specification-Vendor": "Geforce, bl4ckscor3, Redstone_Dubstep",
					"Specification-Version": "${version}",
					"Implementation-Title": "SecurityCraft",
					"Implementation-Version": "${version}",
					"Implementation-Vendor": "Geforce, bl4ckscor3, Redstone_Dubstep"],)
	}
}

tasks.withType(JavaCompile).configureEach {
	options.compilerArgs << "-Xmaxerrs" << "10000"
	options.encoding = 'UTF-8'
	options.release = 25
}

idea {
	module {
		downloadSources = true
		downloadJavadoc = true
	}
}